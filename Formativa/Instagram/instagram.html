<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="instagram.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="main-container">
        <nav class="sidebar">
            <div class="logo">Instagram</div>
            <ul class="nav-links">
                <li><i class="fa-solid fa-house"></i> <span>Página inicial</span></li>
                <li><i class="fa-solid fa-magnifying-glass"></i> <span>Pesquisa</span></li>
                <li><i class="fa-regular fa-compass"></i> <span>Explorar</span></li>
                <li><i class="fa-solid fa-clapperboard"></i> <span>Reels</span></li>
                <li><i class="fa-regular fa-paper-plane"></i> <span>Mensagens</span></li>
                <li><i class="fa-regular fa-heart"></i> <span>Notificações</span></li>
                <li><i class="fa-regular fa-square-plus"></i> <span>Criar</span></li>
            </ul>
        </nav>

        <main class="feed">
            <div class="stories-container">
                <div class="story"><div class="profile-pic"></div><span>Seu story</span></div>
                <div class="story"><div class="profile-pic"></div><span>user_1</span></div>
                <div class="story"><div class="profile-pic"></div><span>user_2</span></div>
                <div class="story"><div class="profile-pic"></div><span>user_3</span></div>
            </div>

            <article class="post">
                <header class="post-header">
                    <div class="user-info">
                        <div class="profile-pic-small"></div>
                        <span class="username">perfil_exemplo</span>
                    </div>
                    <i class="fa-solid fa-ellipsis"></i>
                </header>
                <div class="post-image">
                    <img src="https://picsum.photos/600/600" alt="Post content">
                </div>
                <footer class="post-footer">
                    <div class="post-actions">
                        <i class="fa-regular fa-heart"></i>
                        <i class="fa-regular fa-comment"></i>
                        <i class="fa-regular fa-paper-plane"></i>
                    </div>
                    <div class="likes"><strong>1.240 curtidas</strong></div>
                    <div class="caption">
                        <strong>perfil_exemplo</strong> O pôr do sol hoje estava incrível! 🌅 #natureza #vibe
                    </div>
                </footer>
            </article>
        </main>

        <aside class="suggestions">
            <div class="current-user">
                <div class="profile-pic-med"></div>
                <div>
                    <strong>seu_usuario</strong>
                    <p>Nome Completo</p>
                </div>
                <button class="switch-btn">Mudar</button>
            </div>
            <div class="sug-header">
                <span>Sugestões para você</span>
                <strong>Ver tudo</strong>
            </div>
            </aside>
    </div>

</body>
</html>
